<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* TOPO */
.topo {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px;
  background: #000;
  border-bottom: 2px solid red;
}

.topo-principal {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nome-loja {
  font-size: 30px;
  color: #ff0000;
  font-weight: bold;
  text-shadow: 3px 3px 8px black;
}

.saldo-box {
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: bold;
  font-size: 20px;
}

.sacar-topo {
  background: red;
  padding: 10px 25px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 20px red;
}

.sacar-topo:hover {
  transform: scale(1.1);
}

/* HISTÓRICO */
#historico {
  margin-top: 10px;
  text-align: center;
  font-weight: bold;
}

.historico-num {
  margin: 5px;
  display: inline-block;
  font-size: 18px;
  color: #ff4d4d;
  text-shadow: 0 0 10px red;
}

/* BARRA */
.bar-container {
  width: 100%;
  height: 20px;
  background: #111;
  border-radius: 10px;
  margin-top: 10px;
  position: relative;
  overflow: hidden;
}

.bar-fill {
  position: absolute;
  width: 0%;
  height: 100%;
  background: red;
  border-radius: 10px;
  transition: width 0.05s;
}

/* LOGIN */
.login, .container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box, .box {
  background: #111;
  padding: 25px 35px;
  border-radius: 15px;
  box-shadow: 0 0 35px red;
  text-align: center;
}

/* GAME */
.game-area {
  width: 380px;
  height: 420px;
  border: 3px solid red;
  border-radius: 25px;
  position: relative;
  overflow: hidden;
  margin-top: 25px;
  background: #000;
}

#balao {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 140px;
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
  font-weight:bold;
  background: radial-gradient(circle at 30% 30%, #ff1a1a, #660000);
}

#multiFloat {
  position: absolute;
  left: 65%;
  bottom: 140px;
  font-size: 26px;
  color: #ff4d4d;
  font-weight: bold;
}

/* RESULTADO */
#resultadoTela {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>DEATH STORE</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button id="btnEntrar">Entrar</button>
  </div>
</div>

<!-- TOPO -->
<div class="topo" id="topo">
  <div class="topo-principal">
    <div class="nome-loja">DEATH STORE</div>
    <div class="saldo-box">💎 <span id="saldo">1.0M</span></div>
    <div class="sacar-topo" id="btnSacar">SACAR</div>
  </div>

  <div id="historico"></div>

  <div class="bar-container">
    <div class="bar-fill" id="barFill"></div>
  </div>
</div>

<!-- JOGO -->
<div class="container" id="game" style="display:none;">
  <div class="game-area">
    <div id="balao">INICIAR</div>
    <div id="multiFloat">1.00x</div>
  </div>
  <div class="segurar" id="btnSegurar">INICIAR</div>
</div>

<!-- RESULTADO -->
<div id="resultadoTela">
  <div class="box">
    <h2>💰 SAQUE ÚNICO</h2>
    <h1 id="valor"></h1>
    <p id="codigo"></p>
    <p id="dataHora"></p>

    <button onclick="copiarCodigo()">COPIAR CÓDIGO</button>
    <p>📸 Tire print e envie</p>
  </div>
</div>

<script>
let multi = 1;
let intervalo = null;
let jogando = false;
let historico = [];

const balao = document.getElementById("balao");
const multiFloat = document.getElementById("multiFloat");
const btnSegurar = document.getElementById("btnSegurar");
const btnSacar = document.getElementById("btnSacar");
const barFill = document.getElementById("barFill");

// LOGIN
document.getElementById("btnEntrar").onclick = () => {
  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="flex";
  document.getElementById("topo").style.display="flex";
};

// HISTÓRICO
function adicionarHistorico(valor){
  historico.unshift(valor);
  if(historico.length > 12) historico.pop();

  let html = "";
  historico.forEach(v => {
    html += `<span class="historico-num">${v.toFixed(2)}x</span>`;
  });

  document.getElementById("historico").innerHTML = html;
}

// JOGO
btnSegurar.onclick = () => {
  if(jogando) return;

  jogando = true;
  multi = 1;

  intervalo = setInterval(()=>{
    multi += 0.02;
    multiFloat.innerText = multi.toFixed(2)+"x";
    barFill.style.width = (multi*20)+"%";

    if(Math.random() < 0.03){
      clearInterval(intervalo);
      jogando = false;
      multiFloat.innerText = "💥";

      adicionarHistorico(multi);
    }
  },100);
};

// SACAR
btnSacar.onclick = () => {
  let valor = multi.toFixed(2)+"M";
  let codigo = "DS-" + Date.now() + "-" + Math.floor(Math.random()*9999);
  let data = new Date().toLocaleString();

  document.getElementById("valor").innerText = valor;
  document.getElementById("codigo").innerText = "Código: " + codigo;
  document.getElementById("dataHora").innerText = data;

  document.getElementById("resultadoTela").style.display="flex";
};

// COPIAR
function copiarCodigo(){
  let texto = document.getElementById("codigo").innerText;
  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}
</script>

</body>
</html>
