<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #000 url('https://i.imgur.com/L0GqG6t.jpg') center top / cover no-repeat;
  color: white;
  overflow-x: hidden;
}

/* TOPO */
.topo {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px;
  background: rgba(0,0,0,0.85);
  border-bottom: 2px solid red;
}

.topo-principal {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nome-loja {
  font-size: 30px;
  color: #ff0000;
  font-weight: bold;
  text-shadow: 3px 3px 8px black;
}

.saldo-box {
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: bold;
  font-size: 20px;
}

.sacar-topo {
  background: red;
  padding: 10px 25px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 20px red;
}

.sacar-topo:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px red;
}

/* GRÁFICO */
.bar-container {
  width: 100%;
  height: 20px;
  background: #222;
  border-radius: 10px;
  margin-top: 10px;
  position: relative;
  overflow: hidden;
}

.bar-fill {
  position: absolute;
  width: 0%;
  height: 100%;
  background: red;
  border-radius: 10px;
  transition: width 0.05s;
}

/* LOGIN */
.login, .container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box, .box {
  background: #111;
  padding: 25px 35px;
  border-radius: 15px;
  box-shadow: 0 0 35px red;
  text-align: center;
}

.login-box input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 15px;
  width: 220px;
  text-align: center;
  font-weight: bold;
}

.login-box button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: red;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 15px red;
}

.login-box button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px red;
}

/* GAME */
.game-area {
  width: 380px;
  height: 420px;
  border: 3px solid red;
  border-radius: 25px;
  position: relative;
  overflow: hidden;
  margin-top: 25px;
  background: rgba(0,0,0,0.85);
}

#balao {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 140px;
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
  font-weight:bold;
  background: radial-gradient(circle at 30% 30%, #ff1a1a, #660000);
  box-shadow: 0 0 30px red;
  transition: bottom 0.05s, transform 0.2s;
}

#multiFloat {
  position: absolute;
  left: 65%;
  bottom: 140px;
  font-size: 26px;
  color: #ff4d4d;
  font-weight: bold;
  text-shadow: 1px 1px 5px black;
}

/* BOTÃO SEGURAR */
.segurar {
  margin-top: 20px;
  background: red;
  padding: 14px 30px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  user-select: none;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 0 15px red;
}

.segurar:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px red;
}

/* RESULTADO SAQUE */
#resultadoTela {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000000cc;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#resultadoTela .box h1 {
  font-size: 36px;
  margin: 10px 0;
}

#resultadoTela .box p {
  font-size: 16px;
  margin: 5px 0;
}

/* CONFETE */
.confete {
  position: absolute;
  width: 10px;
  height: 10px;
  background: red;
  opacity: 0.8;
  top: -10px;
  border-radius: 50%;
  animation: cair 2s linear forwards;
}

@keyframes cair {
  to { transform: translateY(500px) rotate(360deg); opacity:0; }
}
</style>
</head>
<body>

<audio id="somExplosao" src="https://www.myinstants.com/media/sounds/explosion.mp3" preload="auto"></audio>
<audio id="somConfete" src="https://www.myinstants.com/media/sounds/cheering-crowd.mp3" preload="auto"></audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>DEATH STORE</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button id="btnEntrar">Entrar</button>
  </div>
</div>

<!-- TOPO -->
<div class="topo" id="topo">
  <div class="topo-principal">
    <div class="nome-loja">DEATH STORE</div>
    <div class="saldo-box">💎 <span id="saldo">1.0M</span></div>
    <div class="sacar-topo" id="btnSacar">SACAR</div>
  </div>
  <div class="bar-container">
    <div class="bar-fill" id="barFill"></div>
  </div>
</div>

<!-- JOGO -->
<div class="container" id="game" style="display:none;">
  <div class="game-area">
    <div id="balao">SEGURE</div>
    <div id="multiFloat">1.00x</div>
  </div>
  <div class="segurar" id="btnSegurar">SEGURAR</div>
</div>

<!-- RESULTADO -->
<div id="resultadoTela">
  <div class="box">
    <h2>💰 SAQUE ÚNICO</h2>
    <h1 id="valor"></h1>
    <p id="codigo"></p>
    <p>🎉 Parabéns, saque realizado com sucesso!</p>
    <p>📸 Tire print e envie para verificação</p>
  </div>
</div>

<script>
let saldo = 1_000_000;
let multi = 1;
let intervalo = null;
let jogando = false;
let usado = false;

// KEYS
const keys = {
  "KEY1":true,"KEY2":true,"KEY3":true,"KEY4":true,"KEY5":true,
  "KEY6":true,"KEY7":true,"KEY8":true,"KEY9":true,"KEY10":true,
  "KEY11":true,"KEY12":true,"KEY13":true,"KEY14":true,"KEY15":true
};

const balao = document.getElementById("balao");
const multiFloat = document.getElementById("multiFloat");
const btnSegurar = document.getElementById("btnSegurar");
const btnSacar = document.getElementById("btnSacar");
const barFill = document.getElementById("barFill");
const gameArea = document.querySelector('.game-area');

const somExplosao = document.getElementById("somExplosao");
const somConfete = document.getElementById("somConfete");

function atualizar(){
  document.getElementById("saldo").innerText = (saldo/1_000_000).toFixed(2) + "M";
}

// LOGIN
document.getElementById("btnEntrar").onclick = () => {
  let key = document.getElementById("keyInput").value.trim();
  if(keys[key]){
    keys[key] = false;
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="flex";
    document.getElementById("topo").style.display="flex";
    atualizar();
    iniciarFakePlayers();
  } else {
    alert("Key inválida ou já usada");
  }
};

btnSegurar.addEventListener("mousedown", iniciar);
btnSegurar.addEventListener("touchstart", iniciar);
btnSegurar.addEventListener("mouseup", parar);
btnSegurar.addEventListener("mouseleave", parar);
btnSegurar.addEventListener("touchend", parar);

function iniciar(){
  if(jogando || usado) return;
  usado = true;
  jogando = true;
  multi = 1;
  let tempo = 0;

  intervalo = setInterval(()=>{
    tempo += 50;
    let progresso = tempo/30000;
    multi = 1 + (0.8*Math.pow(progresso,2));

    if(multi > 1.8) multi = 1.8; // limite máximo

    document.getElementById("saldo").innerText = (Math.floor(1_000_000*multi)/1_000_000).toFixed(2)+"M";
    multiFloat.innerText = multi.toFixed(2)+"x";
    barFill.style.width = (multi/1.8*100)+"%";

    let chance = 0.01 + (progresso *0.08);
    if(Math.random()<chance || multi>=1.8){
      explodir();
      return;
    }

    if(multi >= 1.75){
      somConfete.play();
      criarConfete(20);
    }

    let altura = parseInt(balao.style.bottom)||0;
    altura += 4;
    balao.style.bottom = altura+"px";
  },50);
}

function parar(){ if(!jogando) return; clearInterval(intervalo); jogando=false; }

function explodir(){ clearInterval(intervalo); jogando=false; multiFloat.innerText="💥 EXPLODIU"; somExplosao.play(); criarConfete(30); }

function criarConfete(qtd){ for(let i=0;i<qtd;i++){ let c=document.createElement('div'); c.classList.add('confete'); c.style.left=Math.random()*gameArea.offsetWidth+'px'; gameArea.appendChild(c); setTimeout(()=>c.remove(),2000); } }

// FAKE PLAYERS
function iniciarFakePlayers(){
  const bar = document.querySelector('.bar-container');
  for(let i=0;i<5;i++){
    let dot = document.createElement('div');
    dot.classList.add('player-dot');
    dot.style.left = Math.random()*bar.offsetWidth+"px";
    bar.appendChild(dot);
    setInterval(()=>{
      dot.style.left = Math.random()*bar.offsetWidth+"px";
    },1000);
  }
}

// SACAR
btnSacar.onclick = () => {
  let valorM = (Math.floor(1_000_000*multi)/1_000_000).toFixed(2)+"M";
  let codigo = "DS-"+Math.floor(Math.random()*999999);
  document.getElementById("valor").innerText = "💎 "+valorM;
  document.getElementById("codigo").innerText = "Código: "+codigo;
  document.getElementById("resultadoTela").style.display="flex";
  atualizar();
}
</script>
</body>
</html>
