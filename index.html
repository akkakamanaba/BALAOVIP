<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death Store Pro - Oficial</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; }

        /* TELA DE LOGIN */
        #telaLogin { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .login-box { border: 1px solid #ff0000; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px #ff0000; }
        input { padding: 15px; width: 250px; border-radius: 8px; border: 1px solid #ff0000; background: #111; color: #fff; margin-bottom: 20px; text-align: center; font-size: 16px; }
        
        /* HEADER (SACAR NA ESQUERDA, SALDO NA DIREITA) */
        .topo-interface { 
            display: none; justify-content: space-between; align-items: center; 
            padding: 15px 20px; position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .btn-sacar-topo { background: #00ffcc; color: #000; padding: 12px 25px; border-radius: 8px; font-weight: 900; border: none; cursor: pointer; box-shadow: 0 0 15px #00ffcc; }
        .saldo-box { border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 8px; color: #00ffcc; font-weight: bold; }

        /* ÁREA DO JOGO */
        .game-container { height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #contador { font-size: 90px; font-weight: 900; color: #fff; text-shadow: 0 0 30px #ff0000; font-family: monospace; }
        .btn-iniciar { width: 220px; height: 65px; background: #ff0000; border: none; color: #fff; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 40px; box-shadow: 0 0 20px red; }

        /* TELA DE PRINT (IDÊNTICA À SUA FOTO) */
        #telaPrint {
            position: fixed; inset: 0; background: #000; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .linha-verde { width: 100%; height: 2px; background: #00ffcc; box-shadow: 0 0 15px #00ffcc; margin: 40px 0; }
        .texto-aprovado { color: #00ffcc; letter-spacing: 6px; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #00ffcc; }
        .valor-final { font-size: 110px; font-weight: 900; color: #00ffcc; margin: 15px 0; text-shadow: 0 0 20px #00ffcc; }
        .texto-print { color: #ff0000; font-weight: bold; margin-top: 30px; font-size: 18px; text-transform: uppercase; }

        /* BOTÃO VOLTAR ESCONDIDO NO PRINT */
        .btn-reset { position: absolute; bottom: 20px; opacity: 0.1; background: none; border: none; color: white; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h1 style="color:red; margin-bottom:30px;">DEATH STORE</h1>
        <input type="text" id="keyInput" placeholder="CHAVE DE ACESSO"> <br>
        <button class="btn-iniciar" onclick="logar()">ENTRAR</button>
    </div>
</div>

<div class="topo-interface" id="header">
    <button class="btn-sacar-topo" id="btnSacarReal" onclick="finalizarSaque()">SACAR</button>
    <div class="saldo-box">SALDO: 1.0M</div>
</div>

<div class="game-container" id="gameArea">
    <div id="contador">1.00x</div>
    <button class="btn-iniciar" id="btnPlay" onclick="rodarJogo()">INICIAR</button>
</div>

<div id="telaPrint">
    <div class="linha-verde"></div>
    <div class="texto-aprovado">SAQUE APROVADO</div>
    <div class="valor-final" id="vFinal">1.12M</div>
    <div style="color: #555; font-size: 14px; font-family: monospace;">TRANS-ID: TZB3RPP</div>
    <div class="linha-verde"></div>
    <div class="texto-print">📸 TIRE SEU PRINT AGORA</div>
    <button class="btn-reset" onclick="voltarAoJogo()">reiniciar</button>
</div>

<script>
    let mult = 1.00;
    let rodando = false;
    let contagemSaques = 0;
    let timer = null;

    // AS 5 KEYS QUE VOCÊ PEDIU
    const keysValidas = ["ADMIN1", "DEATH2", "GOLD3", "STORE4", "VIP55"];

    function logar() {
        const pass = document.getElementById('keyInput').value;
        if(keysValidas.includes(pass)) {
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('header').style.display = 'flex';
        } else {
            alert("KEY INVÁLIDA! USE UMA DAS 5 KEYS.");
        }
    }

    function rodarJogo() {
        if(contagemSaques >= 3) {
            alert("SISTEMA TRAVADO: LIMITE DE 3 SAQUES ATINGIDO.");
            return;
        }

        if(!rodando) {
            rodando = true;
            mult = 1.00;
            document.getElementById('btnPlay').style.visibility = 'hidden';
            
            timer = setInterval(() => {
                // Sobe de 0.04 em 0.04 mantendo o 1 fixo
                mult += 0.04;
                
                // Trava para não passar de 1.99 (garante que comece com 1)
                if(mult >= 1.99) mult = 1.98;

                document.getElementById('contador').innerText = mult.toFixed(2) + "x";
            }, 80);
        }
    }

    function finalizarSaque() {
        if(!rodando) return;
        
        clearInterval(timer);
        rodando = false;
        contagemSaques++;

        // Joga o valor pro print (Ex: 1.45M)
        document.getElementById('vFinal').innerText = mult.toFixed(2) + "M";
        document.getElementById('telaPrint').style.display = 'flex';
    }

    function voltarAoJogo() {
        document.getElementById('telaPrint').style.display = 'none';
        document.getElementById('btnPlay').style.visibility = 'visible';
        document.getElementById('contador').innerText = "1.00x";
    }
</script>

</body>
</html>
