<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>
<style>
    body { margin: 0; font-family: 'Arial', sans-serif; background: #000; color: white; overflow-x: hidden; }

    /* TOPO */
    .topo { display: none; flex-direction: column; align-items: center; padding: 15px 20px; background: #000; border-bottom: 2px solid red; }
    .topo-principal { width: 100%; display: flex; justify-content: space-between; align-items: center; }
    .nome-loja { font-size: 24px; color: #ff0000; font-weight: bold; text-shadow: 0 0 10px red; }
    .saldo-box { font-weight: bold; font-size: 18px; color: #00ffcc; }

    /* BARRA DE PROGRESSO */
    .bar-container { width: 90%; height: 10px; background: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; border: 1px solid #444; }
    .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff4d4d); transition: width 0.1s; }

    /* LOGIN */
    .login, .container { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    .box-estilizada { background: #111; padding: 30px; border-radius: 15px; border: 1px solid red; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); text-align: center; }
    
    input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }
    button { padding: 12px 25px; border-radius: 8px; border: none; background: red; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { transform: scale(1.05); background: #cc0000; }

    /* ÁREA DO JOGO */
    .game-area { width: 300px; height: 300px; border: 4px solid red; border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.2); }
    #multiFloat { font-size: 45px; font-weight: bold; color: #ff4d4d; text-shadow: 0 0 15px red; }

    /* BOTÃO DE AÇÃO PRINCIPAL */
    .btn-acao { width: 200px; height: 60px; font-size: 20px; border-radius: 50px; background: red; box-shadow: 0 0 20px red; border: none; color: white; font-weight: bold; cursor: pointer; z-index: 100; }
    .btn-acao.parar { background: #ffcc00; color: black; box-shadow: 0 0 20px #ffcc00; }

    /* TELA DE RESULTADO */
    #resultadoTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 999; }
</style>
</head>
<body>

<div class="login" id="login">
    <div class="box-estilizada">
        <h2 style="color:red">DEATH STORE</h2>
        <input type="text" id="keyInput" placeholder="Digite sua KEY"> <br>
        <button id="btnEntrar">ENTRAR NO SISTEMA</button>
    </div>
</div>

<div class="topo" id="topo">
    <div class="topo-principal">
        <div class="nome-loja">DEATH STORE</div>
        <div class="saldo-box">💎 <span id="saldo">1.0M</span></div>
    </div>
    <div class="bar-container"><div class="bar-fill" id="barFill"></div></div>
</div>

<div class="container" id="game" style="display:none;">
    <div class="game-area">
        <div id="multiFloat">1.00x</div>
    </div>
    <button class="btn-acao" id="btnPrincipal">INICIAR</button>
</div>

<div id="resultadoTela">
    <div class="box-estilizada">
        <h2 style="color:#00ffcc">💰 SAQUE CONFIRMADO</h2>
        <h1 id="valorExibido" style="font-size: 40px;">0.00M</h1>
        <p id="codigoID" style="color: #aaa;"></p>
        <p id="dataHora" style="font-size: 12px;"></p>
        <button onclick="location.reload()" style="background:#444">VOLTAR</button>
        <button onclick="copiarCodigo()" style="background:#00ffcc; color: black;">COPIAR E PRINTAR</button>
        <p style="margin-top:15px; font-size: 14px;">📸 Tire o print agora!</p>
    </div>
</div>

<script>
let multi = 1.0;
let intervalo = null;
let jogando = false;

const btnPrincipal = document.getElementById("btnPrincipal");
const multiFloat = document.getElementById("multiFloat");
const barFill = document.getElementById("barFill");

// LOGIN
document.getElementById("btnEntrar").onclick = () => {
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="flex";
    document.getElementById("topo").style.display="flex";
};

// LÓGICA DO BOTÃO PRINCIPAL
btnPrincipal.onclick = () => {
    if (!jogando) {
        iniciarJogo();
    } else {
        finalizarSaque();
    }
};

function iniciarJogo() {
    jogando = true;
    multi = 1.0;
    btnPrincipal.innerText = "SACAR AGORA";
    btnPrincipal.classList.add("parar");
    
    intervalo = setInterval(() => {
        multi += 0.03;
        multiFloat.innerText = multi.toFixed(2) + "x";
        
        // Barra de progresso baseada no multiplicador
        let progresso = (multi - 1) * 20; 
        barFill.style.width = Math.min(progresso, 100) + "%";

        // Chance aleatória de "quebrar" (crash)
        if (Math.random() < 0.01) { 
            boom();
        }
    }, 100);
}

function finalizarSaque() {
    clearInterval(intervalo);
    jogando = false;
    
    // Preenche os dados da tela de print
    document.getElementById("valorExibido").innerText = multi.toFixed(2) + "M";
    document.getElementById("codigoID").innerText = "ID: DS-" + Math.floor(Math.random() * 999999);
    document.getElementById("dataHora").innerText = new Date().toLocaleString();
    
    // Mostra a tela de print
    document.getElementById("resultadoTela").style.display = "flex";
}

function boom() {
    clearInterval(intervalo);
    jogando = false;
    multiFloat.innerText = "💥";
    btnPrincipal.innerText = "TENTAR NOVAMENTE";
    btnPrincipal.classList.remove("parar");
    barFill.style.width = "0%";
}

function copiarCodigo() {
    const texto = document.getElementById("codigoID").innerText;
    navigator.clipboard.writeText(texto);
    alert("Código copiado! Pode tirar o print.");
}
</script>
</body>
</html>
