<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: radial-gradient(circle at top, #1a0000, #000);
}

.topo {
  display: none;
  justify-content: space-between;
  padding: 15px;
  background: #000;
  border-bottom: 2px solid red;
}

.login, .container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box, .box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px red;
  text-align: center;
}

.game-area {
  width: 320px;
  height: 380px;
  border: 2px solid red;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  margin-top: 20px;
  background: radial-gradient(circle, #000, #200000);
}

/* BALÃO */
#balao {
  position: absolute;
  bottom: 0px;
  left: 50%;
  transform: translateX(-50%) scale(1);
  width: 100px;
  height: 120px;
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:11px;
  font-weight:bold;
  color:white;
  background: radial-gradient(circle at 30% 30%, #ff1a1a, #660000);
  box-shadow: 0 0 25px red;
}

#multiFloat {
  position: absolute;
  left: 60%;
  bottom: 120px;
  font-weight: bold;
  color: #ff4d4d;
  font-size: 20px;
}

button {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  font-weight:bold;
}

.iniciar { background: red; color:white; }
.parar { background: black; color:white; border:1px solid red; }

#resultadoTela {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000000ee;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="login" id="login">
  <div class="login-box">
    <h2>DEATH STORE</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button id="btnEntrar">Entrar</button>
  </div>
</div>

<div class="topo" id="topo">
  💎 <span id="saldo">0</span>
</div>

<div class="container" id="game" style="display:none;">
  <div class="game-area">
    <div id="balao">DEATH<br>STORE</div>
    <div id="multiFloat">1.00x</div>
  </div>
  <button id="btnStart" class="iniciar">INICIAR</button>
  <button id="btnStop" class="parar">SACAR</button>
</div>

<div id="resultadoTela">
  <div class="box">
    <h2>💰 SAQUE REALIZADO</h2>
    <h1 id="valor"></h1>
    <button onclick="fechar()">OK</button>
  </div>
</div>

<script>
let saldo = 1000;
let multi = 1;
let intervalo;
let jogando = false;
let finalizado = false;

const keys = {"KEY1":1,"KEY2":1,"KEY3":1};

const balao = document.getElementById("balao");
const multiFloat = document.getElementById("multiFloat");

function atualizar(){
  document.getElementById("saldo").innerText = saldo.toLocaleString();
}

document.getElementById("btnEntrar").onclick = () => {
  let key = document.getElementById("keyInput").value.trim();
  if(keys[key]){
    delete keys[key];
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="flex";
    document.getElementById("topo").style.display="flex";
    atualizar();
  } else {
    alert("Key inválida");
  }
};

document.getElementById("btnStart").onclick = () => {
  if(jogando || finalizado) return;

  jogando = true;
  multi = 1;
  let tempo = 0;

  intervalo = setInterval(()=>{
    tempo += 50;

    let progresso = tempo / 30000;

    multi = 1 + (0.8 * Math.pow(progresso, 2));

    let chance = 0.01 + (progresso * 0.08);

    if(Math.random() < chance || multi >= 1.80){
      explodir();
      return;
    }

    multiFloat.innerText = multi.toFixed(2)+"x";

    let altura = parseInt(balao.style.bottom) || 0;
    altura += 2 + (progresso * 3);
    balao.style.bottom = altura+"px";
    balao.style.transform = "translateX(-50%) scale("+multi+")";

  },50);
};

document.getElementById("btnStop").onclick = () => {
  if(!jogando || finalizado) return;

  clearInterval(intervalo);
  jogando = false;
  finalizado = true;

  saldo = Math.floor(saldo * multi);
  mostrar(saldo);
};

function explodir(){
  clearInterval(intervalo);
  jogando = false;
  finalizado = true;

  mostrar(saldo);
}

function gerarCodigo(){
  return "DS-" + Math.floor(Math.random()*999999);
}

function mostrar(valor){
  let codigo = gerarCodigo();

  document.getElementById("valor").innerHTML = `
  💎 ${Number(valor).toLocaleString()}<br><br>
  🎉 PARABÉNS 🎉<br>
  Código: <b>${codigo}</b><br><br>
  Tire print e envie
  `;

  document.getElementById("resultadoTela").style.display="flex";
  atualizar();
}

function fechar(){
  document.getElementById("resultadoTela").style.display="none";
  finalizado = false;
}
</script>

</body>
</html>
