<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death Store Pro</title>
    <style>
        /* RESET E PREVENÇÃO DE ERROS DE TOQUE */
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

        /* HEADER ESTILIZADO */
        .topo {
            height: 70px;
            background: linear-gradient(180deg, #110000 0%, #000 100%);
            border-bottom: 2px solid #ff0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }
        .logo { color: #ff0000; font-weight: 900; font-size: 22px; letter-spacing: 2px; text-shadow: 0 0 10px #ff0000; }
        .saldo { color: #fff; font-weight: bold; font-size: 18px; border: 1px solid #333; padding: 5px 15px; border-radius: 20px; }

        /* ÁREA CENTRAL - O NÚMERO */
        .main-container { height: 80vh; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; }
        
        .display-multiplicador { text-align: center; }
        #contador { 
            font-size: 90px; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 30px #ff0000; 
            margin: 0;
            font-family: monospace;
        }
        .label-status { color: #ff0000; text-transform: uppercase; letter-spacing: 5px; font-size: 12px; margin-top: -10px; }

        /* BOTÃO DE AÇÃO (GRANDE E CLICÁVEL) */
        .botao-master {
            width: 280px;
            height: 80px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
            transition: 0.2s;
            position: relative;
            z-index: 999;
        }
        .botao-master:active { transform: scale(0.95); background: #cc0000; }
        .botao-master.modo-saque { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

        /* TELA DE PRINT (COMPROVANTE) */
        #telaResultado {
            position: fixed; inset: 0; background: #000; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .card-saque {
            background: #0a0a0a;
            border: 2px solid #ff0000;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        }
        .card-saque h2 { color: #ff0000; margin-top: 0; letter-spacing: 2px; }
        .valor-final { font-size: 60px; font-weight: 900; margin: 20px 0; color: #fff; }

        /* TELA DE LOGIN */
        #telaLogin { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .input-key { 
            background: #111; border: 1px solid #ff0000; padding: 15px; color: #fff; 
            width: 250px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 16px;
        }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="logo" style="font-size: 35px; margin-bottom: 30px;">DEATH STORE</div>
    <input type="password" class="input-key" placeholder="DIGITE SUA KEY">
    <button class="botao-master" onclick="logar()" style="height: 60px; width: 250px;">ENTRAR</button>
</div>

<div class="topo">
    <div class="logo">DEATH STORE</div>
    <div class="saldo">💎 1,250,000</div>
</div>

<div class="main-container">
    <div class="display-multiplicador">
        <h1 id="contador">1.00x</h1>
        <div class="label-status" id="statusTxt">Aguardando...</div>
    </div>

    <button id="btnPrincipal" class="botao-master">INICIAR JOGO</button>
</div>

<div id="telaResultado">
    <div class="card-saque">
        <h2>SAQUE CONFIRMADO</h2>
        <div class="valor-final" id="vFinal">1.00M</div>
        <p id="codigoUnico" style="color: #666; font-family: monospace;"></p>
        <p id="dataSaque" style="color: #444; font-size: 12px;"></p>
        <button onclick="location.reload()" style="background:none; border: 1px solid #333; color: #555; padding: 10px; margin-top: 20px; border-radius: 5px;">REINICIAR</button>
    </div>
    <p style="margin-top: 30px; color: #ff0000; font-weight: bold; animate: pulse 1s infinite;">📸 TIRE O PRINT AGORA</p>
</div>

<script>
    let multi = 1.00;
    let rodando = false;
    let loop = null;

    const btn = document.getElementById('btnPrincipal');
    const txtContador = document.getElementById('contador');
    const txtStatus = document.getElementById('statusTxt');

    function logar() {
        document.getElementById('telaLogin').style.opacity = '0';
        setTimeout(() => document.getElementById('telaLogin').style.display = 'none', 300);
    }

    // LÓGICA DE CLIQUE ÚNICO (MAIS RÁPIDO E SEM ERRO)
    btn.onclick = () => {
        if (!rodando) {
            iniciar();
        } else {
            sacar();
        }
    };

    function iniciar() {
        rodando = true;
        multi = 1.00;
        btn.innerText = "SACAR AGORA";
        btn.classList.add('modo-saque');
        txtStatus.innerText = "Subindo...";
        txtStatus.style.color = "#00ff00";

        loop = setInterval(() => {
            multi += 0.04;
            txtContador.innerText = multi.toFixed(2) + "x";

            // Chance de crash (estouro) - Ajuste aqui a dificuldade
            if (Math.random() < 0.012) {
                explodir();
            }
        }, 100);
    }

    function sacar() {
        clearInterval(loop);
        rodando = false;

        // Dados do Print
        document.getElementById('vFinal').innerText = multi.toFixed(2) + "M";
        document.getElementById('codigoUnico').innerText = "ID: " + Math.random().toString(36).substr(2, 9).toUpperCase();
        document.getElementById('dataSaque').innerText = new Date().toLocaleString('pt-BR');

        // Mostra a tela de resultado
        document.getElementById('telaResultado').style.display = 'flex';
    }

    function explodir() {
        clearInterval(loop);
        rodando = false;
        txtContador.innerText = "💥";
        txtContador.style.textShadow = "0 0 30px #ff0000";
        txtStatus.innerText = "CRASHED!";
        txtStatus.style.color = "#ff0000";
        
        btn.innerText = "TENTAR NOVAMENTE";
        btn.classList.remove('modo-saque');
    }
</script>

</body>
</html>
