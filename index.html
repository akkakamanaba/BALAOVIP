<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: radial-gradient(circle at top, #1a0000, #000);
}

/* TOPO */
.topo {
  display: none;
  justify-content: space-between;
  padding: 15px;
  background: #000;
  border-bottom: 2px solid red;
}

.sacar-topo {
  background: red;
  padding: 8px 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* TELAS */
.login, .container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box, .box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px red;
  text-align: center;
}

/* JOGO */
.game-area {
  width: 320px;
  height: 380px;
  border: 2px solid red;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  margin-top: 20px;
  background: radial-gradient(circle, #000, #200000);
}

/* BALÃO */
#balao {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) scale(1);
  width: 100px;
  height: 120px;
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:11px;
  font-weight:bold;
  background: radial-gradient(circle at 30% 30%, #ff1a1a, #660000);
  box-shadow: 0 0 25px red;
}

/* MULTIPLICADOR */
#multiFloat {
  position: absolute;
  left: 60%;
  bottom: 120px;
  font-size: 20px;
  color: #ff4d4d;
}

/* BOTÃO SEGURAR */
.segurar {
  margin-top: 15px;
  background: red;
  padding: 12px 25px;
  border-radius: 10px;
  cursor: pointer;
}

/* SAQUE */
#resultadoTela {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000000ee;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>DEATH STORE</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button id="btnEntrar">Entrar</button>
  </div>
</div>

<!-- TOPO -->
<div class="topo" id="topo">
  💎 <span id="saldo">1,000,000</span>
  <div class="sacar-topo" onclick="sacarTudo()">SACAR</div>
</div>

<!-- JOGO -->
<div class="container" id="game" style="display:none;">
  <div class="game-area">
    <div id="balao">SEGURE</div>
    <div id="multiFloat">1.00x</div>
  </div>

  <div class="segurar" id="btnSegurar">SEGURAR</div>
</div>

<!-- RESULTADO -->
<div id="resultadoTela">
  <div class="box">
    <h2>💰 SAQUE ÚNICO</h2>
    <h1 id="valor"></h1>
    <p id="codigo"></p>

    <p>🎉 Parabéns, saque realizado com sucesso!</p>
    <p>📸 Tire print desta tela</p>
    <p>🎫 Abra um ticket na opção "Sacar" e envie o comprovante</p>
  </div>
</div>

<script>
let saldo = 1000000;
let multi = 1;
let intervalo;
let jogando = false;
let usado = false;

const keys = {"KEY1":true,"KEY2":true,"KEY3":true};

const balao = document.getElementById("balao");
const multiFloat = document.getElementById("multiFloat");

function atualizar(){
  document.getElementById("saldo").innerText = saldo.toLocaleString();
}

// LOGIN
document.getElementById("btnEntrar").onclick = () => {
  let key = document.getElementById("keyInput").value.trim();

  if(keys[key]){
    keys[key] = false;

    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="flex";
    document.getElementById("topo").style.display="flex";

    atualizar();
  } else {
    alert("Key inválida ou já usada");
  }
};

// SEGURAR
document.getElementById("btnSegurar").onclick = () => {

  if(jogando || usado) return;

  usado = true;
  jogando = true;
  multi = 1;

  let tempo = 0;

  intervalo = setInterval(()=>{

    tempo += 50;
    let progresso = tempo / 30000;

    multi = 1 + (0.8 * Math.pow(progresso, 2));

    // saldo em tempo real
    let preview = Math.floor(1000000 * multi);
    document.getElementById("saldo").innerText = preview.toLocaleString();

    let chance = 0.01 + (progresso * 0.08);

    if(Math.random() < chance || multi >= 1.80){
      explodir();
      return;
    }

    multiFloat.innerText = multi.toFixed(2)+"x";

    let altura = parseInt(balao.style.bottom) || 0;
    altura += 2 + (progresso * 3);
    balao.style.bottom = altura+"px";

  },50);
};

// EXPLOSÃO
function explodir(){
  clearInterval(intervalo);
  jogando = false;
  multiFloat.innerText = "💥 EXPLODIU";
}

// SACAR
function sacarTudo(){

  if(!usado){
    alert("Você precisa jogar primeiro!");
    return;
  }

  clearInterval(intervalo);

  saldo = Math.floor(1000000 * multi);

  let codigo = "DS-" + Math.floor(Math.random()*999999);

  document.getElementById("valor").innerText = "💎 " + saldo.toLocaleString();
  document.getElementById("codigo").innerText = "Código: " + codigo;

  document.getElementById("resultadoTela").style.display="flex";
}
</script>

</body>
</html>
