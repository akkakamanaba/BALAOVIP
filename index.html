<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATH STORE - MINES SYSTEM</title>
    <style>
        :root { 
            --red: #ff0000; 
            --black: #000000; 
            --dark: #0f0f0f; 
            --gray: #1a1a1a; 
            --gold: #ffcc00; 
            --green: #28a745; 
        }
        
        body { 
            background: var(--black); 
            color: white; 
            font-family: 'Impact', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header { 
            width: 100%; 
            background: var(--dark); 
            padding: 15px 0; 
            border-bottom: 3px solid var(--red); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        
        .balance { color: var(--gold); font-size: 1.3rem; text-shadow: 0 0 10px rgba(255,204,0,0.5); }

        .container { 
            width: 90%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }

        #game-screen { display: none; width: 100%; }
        #login-screen { width: 100%; margin-top: 50px; text-align: center; }

        .card { 
            background: var(--dark); 
            border: 2px solid var(--red); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255,0,0,0.2); 
            margin-bottom: 15px; 
            width: 100%;
            box-sizing: border-box;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid var(--red); 
            color: white; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 1.1rem; 
            box-sizing: border-box;
        }

        /* GRID AJUSTADA PARA FICAR COMPACTA E ALINHADA (250px) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 6px; 
            width: 100%;
            max-width: 250px; /* Tamanho fixo para não bagunçar */
            margin: 20px auto; 
            box-sizing: border-box;
        }

        .tile { 
            aspect-ratio: 1 / 1; 
            background: var(--gray); 
            border-radius: 6px; 
            border: 1px solid #333; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem; 
            transition: 0.2s; 
            box-sizing: border-box;
        }

        .tile.revealed { background: #000; cursor: default; border-color: var(--red); }
        .tile.gem { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
        .tile.bomb { color: var(--red); text-shadow: 0 0 15px var(--red); }

        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 1.1rem; 
            margin: 5px 0; 
        }

        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-gold { background: var(--gold); color: black; margin-top: 10px; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }

        #modal-withdraw { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            color: black; 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            z-index: 200; 
            width: 85%; 
            max-width: 320px; 
        }

        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 150; 
        }

        .label-text { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.2rem;"><span style="color:var(--red)">DEATH</span> STORE</div>
        <div class="balance">💰 <span id="user-balance">0</span></div>
    </div>

    <div class="container">
        <div id="login-screen">
            <div class="card">
                <h2 style="color:var(--red); margin: 0 0 15px 0;">ATIVAR KEY</h2>
                <input type="text" id="key-input" placeholder="DIGITE SUA KEY">
                <button class="btn-red" onclick="login()">RESGATAR SALDO</button>
            </div>
        </div>

        <div id="game-screen">
            <div class="card">
                <div class="label-text">MINAS (1-5):</div>
                <input type="number" id="mine-select" value="1" min="1" max="5">
                
                <div class="label-text">VALOR DA APOSTA:</div>
                <input type="number" id="bet-amount" value="1000000">
                
                <button id="btn-start" class="btn-red" onclick="startGame()">INICIAR RODADA</button>
                <button id="btn-cashout" class="btn-green" style="display:none" onclick="stopGame()">COLETAR</button>
            </div>

            <div class="grid" id="board"></div>

            <button class="btn-gold" onclick="openWithdraw()">SOLICITAR SAQUE</button>
        </div>
    </div>

    <div id="overlay"></div>
    <div id="modal-withdraw">
        <h2 style="color: var(--green);">SAQUE DISPONÍVEL</h2>
        <p>Você tem: <br><b id="final-value" style="font-size: 1.5rem;">0</b> GEMAS</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=SAQUE_DEATH" alt="QR">
        <p>TICKET: <span id="ticket-code" style="font-weight:bold; color:var(--red)"></span></p>
        <p style="font-size:0.7rem">Envie o PRINT deste ticket para o suporte.</p>
        <button class="btn-red" onclick="closeModal()">FECHAR</button>
    </div>

    <script>
        let balance = 0;
        let currentBet = 0;
        let currentMultiplier = 1.0;
        let minesLocations = [];
        let gameActive = false;

        // Banco de 20 Keys (4 de cada valor)
        const keyDatabase = {
            "DS-1M-01": 1000000, "DS-1M-02": 1000000, "DS-1M-03": 1000000, "DS-1M-04": 1000000,
            "DS-2M-01": 2000000, "DS-2M-02": 2000000, "DS-2M-03": 2000000, "DS-2M-04": 2000000,
            "DS-3M-01": 3000000, "DS-3M-02": 3000000, "DS-3M-03": 3000000, "DS-3M-04": 3000000,
            "DS-4M-01": 4000000, "DS-4M-02": 4000000, "DS-4M-03": 4000000, "DS-4M-04": 4000000,
            "DS-5M-01": 5000000, "DS-5M-02": 5000000, "DS-5M-03": 5000000, "DS-5M-04": 5000000
        };

        function login() {
            const input = document.getElementById('key-input').value.trim();
            const usedKeys = JSON.parse(localStorage.getItem('death_used_keys') || "[]");

            if (usedKeys.includes(input)) return alert("Key já utilizada!");

            if (keyDatabase[input]) {
                balance = keyDatabase[input];
                usedKeys.push(input);
                localStorage.setItem('death_used_keys', JSON.stringify(usedKeys));
                updateUI();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
            } else {
                alert("Key Inválida!");
            }
        }

        function startGame() {
            const betInput = document.getElementById('bet-amount');
            const mineInput = document.getElementById('mine-select');
            currentBet = parseInt(betInput.value);
            const numMines = parseInt(mineInput.value);

            if (currentBet > balance) return alert("Saldo insuficiente!");
            if (numMines < 1 || numMines > 5) return alert("Escolha de 1 a 5 minas!");
            if (currentBet <= 0) return alert("Aposta inválida!");

            balance -= currentBet;
            gameActive = true;
            
            // Multiplicador inicial: 1 mina = 1.1 | 5 minas = 1.5
            currentMultiplier = 1 + (numMines * 0.1);
            
            updateUI();
            
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cashout').style.display = 'block';
            document.getElementById('btn-cashout').innerText = `PARAR: ${(currentBet * currentMultiplier).toLocaleString()}`;
            
            generateBoard(numMines);
        }

        function generateBoard(numMines) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            minesLocations = [];

            while(minesLocations.length < numMines) {
                let pos = Math.floor(Math.random() * 25);
                if(!minesLocations.includes(pos)) minesLocations.push(pos);
            }

            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.onclick = () => revealTile(tile, i);
                board.appendChild(tile);
            }
        }

        function revealTile(tile, index) {
            if (!gameActive || tile.classList.contains('revealed')) return;

            tile.classList.add('revealed');

            if (minesLocations.includes(index)) {
                tile.innerHTML = '💣';
                tile.classList.add('bomb');
                gameActive = false;
                setTimeout(() => {
                    alert("BOOM! Você perdeu a aposta.");
                    if (balance <= 0) {
                        alert("Saldo Zerado. Key Expirada!");
                        location.reload();
                    }
                    gameOver(false);
                }, 200);
            } else {
                tile.innerHTML = '💎';
                tile.classList.add('gem');
                currentMultiplier += 0.12; // Aumenta o lucro a cada diamante
                document.getElementById('btn-cashout').innerText = `RETIRAR: ${Math.floor(currentBet * currentMultiplier).toLocaleString()}`;
            }
        }

        function stopGame() {
            if (!gameActive) return;
            const prize = Math.floor(currentBet * currentMultiplier);
            balance += prize;
            gameOver(true);
            alert(`Sucesso! +${prize.toLocaleString()} Gemas.`);
        }

        function gameOver(win) {
            gameActive = false;
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cashout').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            document.getElementById('user-balance').innerText = balance.toLocaleString();
        }

        function openWithdraw() {
            document.getElementById('final-value').innerText = balance.toLocaleString();
            document.getElementById('ticket-code').innerText = "DS-" + Math.floor(Math.random()*99999);
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal-withdraw').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal-withdraw').style.display = 'none';
        }
    </script>
</body>
</html>
