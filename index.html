<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: radial-gradient(circle at top, #1a0000, #000);
}

.topo {
  display: none;
  justify-content: space-between;
  padding: 15px;
  background: #000000cc;
  border-bottom: 2px solid red;
}

.login, .container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box, .box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px red;
  text-align: center;
}

.game-area {
  width: 320px;
  height: 380px;
  border: 2px solid red;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  margin-top: 20px;
  background: radial-gradient(circle, #000, #200000);
}

/* 🎈 BALÃO PROFISSIONAL */
#balao {
  position: absolute;
  bottom: 0px;
  left: 50%;
  transform: translateX(-50%) scale(1);
  width: 100px;
  height: 120px;
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:11px;
  font-weight:bold;
  color:white;

  background:
    radial-gradient(circle at 30% 30%, #ff4d4d, #990000),
    repeating-radial-gradient(circle, rgba(255,255,255,0.08) 0px, transparent 3px);

  box-shadow:
    inset -10px -20px 40px rgba(0,0,0,0.8),
    inset 10px 10px 20px rgba(255,255,255,0.2),
    0 0 25px red;
}

#balao::before {
  content:"";
  position:absolute;
  top:15px;
  left:25px;
  width:20px;
  height:30px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  filter:blur(3px);
}

#balao::after {
  content:"";
  position:absolute;
  width:140%;
  height:140%;
  background: radial-gradient(circle, rgba(255,0,0,0.2), transparent);
  z-index:-1;
}

#multiFloat {
  position: absolute;
  left: 60%;
  bottom: 120px;
  font-weight: bold;
  color: #00ffcc;
  font-size: 18px;
}

button {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  font-weight:bold;
  font-size:16px;
}

.iniciar { background: #00aa00; color:white; }
.parar { background: red; color:white; }

#resultadoTela {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000000ee;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="login" id="login">
  <div class="login-box">
    <h2>DEATH STORE</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button id="btnEntrar">Entrar</button>
  </div>
</div>

<div class="topo" id="topo">
  <span>💎 <span id="saldo">0</span></span>
</div>

<div class="container" id="game" style="display:none;">
  <div class="game-area">
    <div id="balao">DEATH<br>STORE</div>
    <div id="multiFloat">1.00x</div>
  </div>
  <button id="btnStart" class="iniciar">INICIAR</button>
  <button id="btnStop" class="parar">PARAR</button>
</div>

<div id="resultadoTela">
  <div class="box">
    <h2>SAQUE REALIZADO</h2>
    <h1 id="valor"></h1>
    <p>Tire print e envie</p>
    <button onclick="fechar()">OK</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let saldo = 1000000;
let multi = 1;
let intervalo;
let jogando = false;
let finalizado = false;

const keys = {"KEY1":1,"KEY2":1,"KEY3":1};

const balao = document.getElementById("balao");
const multiFloat = document.getElementById("multiFloat");

function atualizar(){
  document.getElementById("saldo").innerText = saldo.toLocaleString();
}

document.getElementById("btnEntrar").onclick = () => {
  let key = document.getElementById("keyInput").value.trim();
  if(keys[key]){
    delete keys[key];
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="flex";
    document.getElementById("topo").style.display="flex";
    atualizar();
  } else {
    alert("Key inválida");
  }
};

document.getElementById("btnStart").onclick = () => {
  if(jogando || finalizado) return;

  jogando = true;

  intervalo = setInterval(()=>{
    multi += 0.03;

    // risco crescente
    if(Math.random() < multi * 0.01){
      explodir();
      return;
    }

    multiFloat.innerText = multi.toFixed(2)+"x";

    let altura = parseInt(balao.style.bottom) || 0;
    altura += 4;
    balao.style.bottom = altura+"px";
    balao.style.transform = "translateX(-50%) scale("+multi+")";

  },50);
};

document.getElementById("btnStop").onclick = () => {
  if(!jogando || finalizado) return;

  clearInterval(intervalo);
  jogando = false;
  finalizado = true;

  saldo = Math.floor(saldo * multi);
  mostrar(saldo);
};

function explodir(){
  clearInterval(intervalo);
  jogando = false;
  finalizado = true;

  saldo = 0;
  mostrar(0);
}

function mostrar(valor){
  document.getElementById("valor").innerText = "💎 "+Number(valor).toLocaleString();
  document.getElementById("resultadoTela").style.display="flex";
  atualizar();
}

window.fechar = function(){
  document.getElementById("resultadoTela").style.display="none";
  saldo = 0;
  atualizar();
}

});
</script>

</body>
</html>
