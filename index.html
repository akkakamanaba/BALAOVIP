<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death Store - Premium</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; }

        /* LOGIN LOCAL */
        #telaLogin { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .login-box { border: 2px solid #ff0000; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px #ff0000; }
        input { padding: 15px; width: 260px; border-radius: 10px; border: 1px solid #ff0000; background: #111; color: #fff; margin-bottom: 20px; text-align: center; font-size: 18px; }

        /* HEADER */
        .header { 
            display: none; justify-content: space-between; align-items: center; 
            padding: 20px; position: fixed; top: 0; width: 100%; z-index: 100;
        }
        #btnSacar { 
            background: #00ffcc; color: #000; padding: 12px 25px; border-radius: 8px; 
            font-weight: 900; border: none; cursor: pointer; visibility: hidden;
            box-shadow: 0 0 15px #00ffcc; 
        }
        .saldo-box { border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 8px; color: #00ffcc; font-weight: bold; }

        /* JOGO */
        .container { height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #contador { font-size: 80px; font-weight: 900; color: #fff; text-shadow: 0 0 25px #ff0000; font-family: monospace; }
        .btn-iniciar { width: 220px; height: 65px; background: #ff0000; border: none; color: #fff; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 40px; }

        /* PRINT FINAL */
        #telaPrint {
            position: fixed; inset: 0; background: #000; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .linha-verde { width: 100%; height: 2px; background: #00ffcc; box-shadow: 0 0 15px #00ffcc; margin: 40px 0; }
        .texto-aprovado { color: #00ffcc; letter-spacing: 5px; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #00ffcc; }
        .valor-final { font-size: 90px; font-weight: 900; color: #00ffcc; margin: 10px 0; }
        .obs-print { color: #ff0000; font-weight: bold; margin-top: 25px; font-size: 18px; text-transform: uppercase; }
        
        .btn-voltar { position: absolute; bottom: 20px; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h1 style="color:red">DEATH STORE</h1>
        <input type="text" id="keyField" placeholder="CHAVE DE ACESSO"> <br>
        <button class="btn-iniciar" onclick="logar()" style="margin-top:0;">ENTRAR</button>
        <p style="color: #333; font-size: 10px; margin-top: 15px;">KEYS LOCAIS: DS-01, DS-02, DS-03, DS-04, DS-05</p>
    </div>
</div>

<div class="header" id="uiHeader">
    <button id="btnSacar" onclick="finalizar()">SACAR</button>
    <div class="saldo-box" id="saldoDisplay">SALDO: 1.00M</div>
</div>

<div class="container" id="jogoContainer">
    <div id="contador">1.00M</div>
    <button class="btn-iniciar" id="btnPlay" onclick="jogar()">INICIAR</button>
</div>

<div id="telaPrint">
    <div class="linha-verde"></div>
    <div class="texto-aprovado">SAQUE APROVADO</div>
    <div class="valor-final" id="vFinal">1.00M</div>
    <div style="color: #444; font-family: monospace;">TRANS-ID: TZB3RPP</div>
    <div class="linha-verde"></div>
    <div class="obs-print">📸 TIRE SEU PRINT AGORA</div>
    <button class="btn-voltar" onclick="resetar()">reiniciar</button>
</div>

<script>
    let mult = 0; // Vai de 0 a 99
    let saldoBase = 1.00;
    let rodando = false;
    let limite = 0;
    let timer = null;
    
    // KEYS LOCAIS
    const keysLocais = ["DS-01", "DS-02", "DS-03", "DS-04", "DS-05"];

    function logar() {
        const k = document.getElementById('keyField').value;
        if(keysLocais.includes(k)) {
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('jogoContainer').style.display = 'flex';
            document.getElementById('uiHeader').style.display = 'flex';
        } else { alert("KEY INVÁLIDA!"); }
    }

    function jogar() {
        if(limite >= 3) {
            alert("LIMITE ATINGIDO!");
            return;
        }
        if(!rodando) {
            rodando = true;
            mult = 0;
            document.getElementById('btnPlay').style.visibility = 'hidden';
            document.getElementById('btnSacar').style.visibility = 'visible';
            
            timer = setInterval(() => {
                // Incrementa os decimais aleatoriamente
                mult += Math.floor(Math.random() * 5) + 1;
                
                // Trava no .99 para nunca mudar o 1 da frente
                if(mult > 99) mult = 99;

                // Formata para aparecer sempre 1.XX M
                let exibicao = "1." + (mult < 10 ? "0" + mult : mult) + "M";
                document.getElementById('contador').innerText = exibicao;
            }, 80);
        }
    }

    function finalizar() {
        if(!rodando) return;
        clearInterval(timer);
        rodando = false;
        limite++;

        let valorFinalStr = "1." + (mult < 10 ? "0" + mult : mult) + "M";
        
        // Atualiza o saldo do topo somando apenas a "gordura" do saque
        saldoBase += (mult / 100);
        document.getElementById('saldoDisplay').innerText = "SALDO: " + saldoBase.toFixed(2) + "M";

        // Prepara Print
        document.getElementById('vFinal').innerText = valorFinalStr;
        document.getElementById('telaPrint').style.display = 'flex';
        document.getElementById('btnSacar').style.visibility = 'hidden';
    }

    function resetar() {
        document.getElementById('telaPrint').style.display = 'none';
        document.getElementById('btnPlay').style.visibility = 'visible';
        document.getElementById('contador').innerText = "1.00M";
    }
</script>

</body>
</html>
