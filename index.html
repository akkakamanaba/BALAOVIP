<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death Store Pro - Edição Luxo</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        /* HISTÓRICO NO TOPO */
        .historico {
            height: 50px; background: #050505; border-bottom: 2px solid #ff0000;
            display: flex; align-items: center; overflow: hidden; white-space: nowrap; padding: 0 10px;
        }
        .h-item { color: #ff0000; font-size: 14px; margin-right: 15px; text-shadow: 0 0 5px #ff0000; opacity: 0.8; }

        /* ÁREA DO JOGO */
        .game-view { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        #contador { font-size: 100px; margin: 0; transition: color 0.3s; text-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .vitoria #contador { color: #00ffcc; text-shadow: 0 0 40px #00ffcc; }

        /* BALÃO / ESFERA */
        #balao {
            position: absolute; width: 120px; height: 120px;
            background: radial-gradient(circle at 30% 30%, #ff0000, #220000);
            border-radius: 50%; box-shadow: 0 0 60px #ff0000;
            bottom: -150px; display: none; z-index: -1;
        }

        /* BOTÃO MESTRE */
        .footer-btn { height: 20vh; display: flex; justify-content: center; align-items: center; background: #080808; border-top: 1px solid #222; }
        
        #btnAcao {
            width: 85%; height: 85px; border: none; border-radius: 20px;
            font-size: 24px; font-weight: 900; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* ESTADOS DO BOTÃO */
        .btn-iniciar { background: #ff0000; color: white; box-shadow: 0 8px 0 #800000; }
        .btn-sacar { background: #fff; color: #000; box-shadow: 0 8px 0 #ccc; animation: pulse 1s infinite; }
        .btn-confirmar { background: #00ffcc !important; color: #000 !important; box-shadow: 0 8px 0 #008f72 !important; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 0 #ccc, 0 0 0px #fff; }
            50% { transform: scale(1.03); box-shadow: 0 8px 0 #ccc, 0 0 20px #fff; }
            100% { transform: scale(1); box-shadow: 0 8px 0 #ccc, 0 0 0px #fff; }
        }

        /* TELA FINAL */
        #telaPrint {
            position: fixed; inset: 0; background: #000; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .recibo { width: 85%; border: 3px solid #00ffcc; border-radius: 30px; padding: 40px; text-align: center; background: #050505; }
        .recibo h1 { font-size: 60px; color: #00ffcc; margin: 15px 0; }
    </style>
</head>
<body>

<div class="historico" id="hist"></div>

<div class="game-view" id="gameArea">
    <h1 id="contador">1.00x</h1>
    <div id="balao"></div>
</div>

<div class="footer-btn">
    <button id="btnAcao" class="btn-iniciar">INICIAR JOGO</button>
</div>

<div id="telaPrint">
    <div class="recibo">
        <p style="color:#00ffcc; letter-spacing:3px;">SAQUE APROVADO</p>
        <h1 id="vFinal">0.00M</h1>
        <p id="idHash" style="font-family:monospace; color:#444; font-size:12px;"></p>
        <button onclick="location.reload()" style="background:none; border:1px solid #222; color:#333; padding:10px; margin-top:20px; border-radius:10px;">FECHAR</button>
    </div>
    <h3 style="color:#ff0000; margin-top:30px;">📸 TIRE SEU PRINT AGORA</h3>
</div>

<script>
    let mult = 1.00;
    let rodando = false;
    let timer = null;
    let fase = "start"; // start, play, win

    const btn = document.getElementById('btnAcao');
    const display = document.getElementById('contador');
    const balao = document.getElementById('balao');
    const area = document.getElementById('gameArea');

    // Histórico Fake Vermelho
    for(let i=0; i<10; i++) {
        document.getElementById('hist').innerHTML += `<span class="h-item">${(Math.random()*5+1).toFixed(2)}x</span>`;
    }

    btn.onclick = () => {
        if (fase === "start") {
            iniciar();
        } else if (fase === "play") {
            pararERetirar();
        } else if (fase === "win") {
            abrirRecibo();
        }
    };

    function iniciar() {
        fase = "play";
        mult = 1.00;
        area.classList.remove('vitoria');
        btn.innerText = "SACAR AGORA";
        btn.className = "btn-sacar";
        balao.style.display = "block";
        balao.style.bottom = "-150px";

        timer = setInterval(() => {
            mult += 0.04;
            display.innerText = mult.toFixed(2) + "x";
            
            // Sobe o balão
            let pos = parseInt(balao.style.bottom) + 3;
            balao.style.bottom = pos + "px";

            if(Math.random() < 0.01 && mult > 2.0) { crash(); }
        }, 80);
    }

    function pararERetirar() {
        clearInterval(timer);
        fase = "win";
        
        // Efeito Visual de Sucesso
        area.classList.add('vitoria');
        btn.innerText = "GERAR COMPROVANTE";
        btn.className = "btn-confirmar";
        
        // Vibração leve (se for no celular)
        if(navigator.vibrate) navigator.vibrate(100);
    }

    function abrirRecibo() {
        document.getElementById('vFinal').innerText = mult.toFixed(2) + "M";
        document.getElementById('idHash').innerText = "TRANS-ID: " + Math.random().toString(36).toUpperCase().slice(2,10);
        document.getElementById('telaPrint').style.display = "flex";
    }

    function crash() {
        clearInterval(timer);
        fase = "start";
        display.innerText = "💥";
        display.style.color = "red";
        btn.innerText = "TENTAR NOVAMENTE";
        btn.className = "btn-iniciar";
        balao.style.display = "none";
        setTimeout(() => { display.style.color = "white"; }, 1000);
    }
</script>

</body>
</html>
